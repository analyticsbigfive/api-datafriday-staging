name: Deploy to Staging

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      skip_tests:
        description: 'Skip tests'
        required: false
        default: 'false'
        type: boolean

env:
  NODE_VERSION: '20.x'
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # ====================
  # Tests
  # ====================
  test:
    name: 🧪 Tests
    runs-on: ubuntu-latest
    if: ${{ github.event.inputs.skip_tests != 'true' }}
    
    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 📦 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: 📚 Install dependencies
        run: npm ci

      - name: 🔧 Generate Prisma Client
        run: npx prisma generate

      - name: 🧪 Run tests
        run: npm test -- --passWithNoTests --forceExit
        env:
          NODE_ENV: test
          JWT_SECRET: test-secret-key-for-ci
          ENCRYPTION_KEY: 0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef
          REDIS_URL: redis://localhost:6379

  # ====================
  # Build Docker Image
  # ====================
  build:
    name: 🐳 Build & Push
    runs-on: ubuntu-latest
    needs: [test]
    if: always() && (needs.test.result == 'success' || needs.test.result == 'skipped')
    permissions:
      contents: read
      packages: write
    
    outputs:
      image-tag: ${{ steps.meta.outputs.tags }}
      image-digest: ${{ steps.build.outputs.digest }}
    
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🐳 Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 🔐 Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 📋 Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=staging-
            type=raw,value=staging-latest

      - name: 🏗️ Build and push Docker image
        id: build
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            NODE_ENV=production

  # ====================
  # Deploy to VPS via SSH
  # ====================
  deploy-vps:
    name: 🚀 Deploy to VPS
    runs-on: ubuntu-latest
    needs: [build]
    environment:
      name: staging
      url: ${{ vars.STAGING_URL }}
    
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🔐 Setup SSH
        uses: webfactory/ssh-agent@v0.8.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: 📋 Add host to known_hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H ${{ secrets.SSH_HOST }} >> ~/.ssh/known_hosts

      - name: 🚀 Deploy to staging server
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
        run: |
          ssh $SSH_USER@$SSH_HOST << 'ENDSSH'
            set -e
            DEPLOY_PATH="${{ vars.DEPLOY_PATH }}"
            if [ -z "$DEPLOY_PATH" ]; then DEPLOY_PATH="/opt/datafriday"; fi

            cd "$DEPLOY_PATH"

            API_IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:staging-latest"
            GHCR_USERNAME="${{ secrets.GHCR_USERNAME }}"
            GHCR_PAT="${{ secrets.GHCR_PAT }}"

            if [ -n "$GHCR_USERNAME" ] && [ -n "$GHCR_PAT" ]; then
              echo "$GHCR_PAT" | docker login ghcr.io -u "$GHCR_USERNAME" --password-stdin
            fi
            
            echo "🔄 Pulling latest image..."
            docker pull "$API_IMAGE"
            
            echo "🛑 Stopping current containers..."
            API_IMAGE="$API_IMAGE" docker-compose -f docker-compose.staging.yml --env-file envFiles/.env.staging down || true
            
            echo "🚀 Starting new containers..."
            API_IMAGE="$API_IMAGE" docker-compose -f docker-compose.staging.yml --env-file envFiles/.env.staging up -d --no-build
            
            echo "🧹 Cleaning old images..."
            docker image prune -f
            
            echo "✅ Deployment complete!"
          ENDSSH

      - name: 🏥 Health Check
        run: |
          echo "⏳ Waiting for API to start..."
          sleep 30
          
          for i in {1..5}; do
            if curl -sf "${{ vars.STAGING_URL }}/api/v1/health" > /dev/null; then
              echo "✅ Health check passed!"
              exit 0
            fi
            echo "⏳ Attempt $i failed, retrying in 10s..."
            sleep 10
          done
          
          echo "❌ Health check failed after 5 attempts"
          exit 1

      - name: 📣 Notify on Slack (optional)
        if: success()
        uses: slackapi/slack-github-action@v1.24.0
        continue-on-error: true
        with:
          payload: |
            {
              "text": "✅ DataFriday API deployed to staging!",
              "blocks": [
                {
                  "type": "section",
                  "text": {
                    "type": "mrkdwn",
                    "text": "*✅ Deployment Successful*\n\n• Environment: Staging\n• Branch: ${{ github.ref_name }}\n• Commit: ${{ github.sha }}\n• URL: ${{ vars.STAGING_URL }}"
                  }
                }
              ]
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

  # ====================
  # Deploy Edge Functions
  # ====================
  deploy-edge-functions:
    name: ⚡ Deploy Edge Functions
    runs-on: ubuntu-latest
    needs: [deploy-vps]
    
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 📦 Setup Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: 🔐 Login to Supabase
        run: |
          supabase login --token ${{ secrets.SUPABASE_ACCESS_TOKEN }}

      - name: 🔗 Link project
        run: |
          supabase link --project-ref ${{ secrets.SUPABASE_PROJECT_ID }}

      - name: ⚡ Deploy Edge Functions
        run: |
          echo "📤 Deploying health function..."
          supabase functions deploy health --no-verify-jwt
          
          echo "📤 Deploying heavy-processing function..."
          supabase functions deploy heavy-processing
          
          echo "✅ Edge Functions deployed!"
