name: Deploy to Production

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Environment to deploy'
        required: true
        default: 'staging'
        type: choice
        options:
          - staging
          - production

env:
  NODE_VERSION: '20.x'
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  # ====================
  # Build & Push Docker Image
  # ====================
  build-and-push:
    name: 🐳 Build & Push
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    
    outputs:
      image-tag: ${{ steps.meta.outputs.tags }}
    
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: 🐳 Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 🔐 Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: 📋 Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=tag
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha,format=long,prefix=
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: 🏗️ Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          build-args: |
            NODE_ENV=production

  # ====================
  # Deploy to Staging
  # ====================
  deploy-staging:
    name: 🚀 Deploy Staging
    runs-on: ubuntu-latest
    needs: build-and-push
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.environment == 'staging'
    environment:
      name: staging
      url: ${{ vars.STAGING_URL }}
    
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: � Setup SSH
        uses: webfactory/ssh-agent@v0.8.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: 📋 Add host to known_hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H ${{ secrets.SSH_HOST }} >> ~/.ssh/known_hosts

      - name: 🚀 Deploy to staging server
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
        run: |
          ssh $SSH_USER@$SSH_HOST << 'ENDSSH'
            set -e

            DEPLOY_PATH="${{ vars.DEPLOY_PATH }}"
            if [ -z "$DEPLOY_PATH" ]; then DEPLOY_PATH="/opt/datafriday"; fi
            cd "$DEPLOY_PATH"

            API_IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}"
            GHCR_USERNAME="${{ secrets.GHCR_USERNAME }}"
            GHCR_PAT="${{ secrets.GHCR_PAT }}"

            if [ -n "$GHCR_USERNAME" ] && [ -n "$GHCR_PAT" ]; then
              echo "$GHCR_PAT" | docker login ghcr.io -u "$GHCR_USERNAME" --password-stdin
            fi

            docker pull "$API_IMAGE"

            API_IMAGE="$API_IMAGE" docker-compose -f docker-compose.staging.yml --env-file envFiles/.env.staging down || true
            API_IMAGE="$API_IMAGE" docker-compose -f docker-compose.staging.yml --env-file envFiles/.env.staging up -d --no-build

            docker image prune -f
          ENDSSH

      - name: 🏥 Health Check
        run: |
          echo "⏳ Waiting for API to start..."
          sleep 30
          for i in {1..5}; do
            if curl -sf "${{ vars.STAGING_URL }}/api/v1/health" > /dev/null; then
              echo "✅ Health check passed!"
              exit 0
            fi
            echo "⏳ Attempt $i failed, retrying in 10s..."
            sleep 10
          done
          echo "❌ Health check failed after 5 attempts"
          exit 1

  # ====================
  # Deploy to Production
  # ====================
  deploy-production:
    name: 🚀 Deploy Production
    runs-on: ubuntu-latest
    needs: [build-and-push]
    if: github.event.inputs.environment == 'production' || github.event_name == 'release'
    environment:
      name: production
      url: ${{ vars.PRODUCTION_URL }}
    
    steps:
      - name: 📥 Checkout code
        uses: actions/checkout@v4

      - name: � Setup SSH
        uses: webfactory/ssh-agent@v0.8.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}

      - name: 📋 Add host to known_hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H ${{ secrets.SSH_HOST }} >> ~/.ssh/known_hosts

      - name: 🚀 Deploy to production server
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
        run: |
          ssh $SSH_USER@$SSH_HOST << 'ENDSSH'
            set -e

            DEPLOY_PATH="${{ vars.DEPLOY_PATH }}"
            if [ -z "$DEPLOY_PATH" ]; then DEPLOY_PATH="/opt/datafriday"; fi
            cd "$DEPLOY_PATH"

            if [ "${{ github.event_name }}" = "release" ]; then
              API_IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.ref_name }}"
            else
              API_IMAGE="${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}"
            fi

            GHCR_USERNAME="${{ secrets.GHCR_USERNAME }}"
            GHCR_PAT="${{ secrets.GHCR_PAT }}"

            if [ -n "$GHCR_USERNAME" ] && [ -n "$GHCR_PAT" ]; then
              echo "$GHCR_PAT" | docker login ghcr.io -u "$GHCR_USERNAME" --password-stdin
            fi

            docker pull "$API_IMAGE"

            API_IMAGE="$API_IMAGE" docker-compose -f docker-compose.production.yml --env-file envFiles/.env.production down || true
            API_IMAGE="$API_IMAGE" docker-compose -f docker-compose.production.yml --env-file envFiles/.env.production up -d --no-build

            docker image prune -f
          ENDSSH

      - name: 🏥 Health Check
        run: |
          echo "⏳ Waiting for API to start..."
          sleep 30
          for i in {1..5}; do
            if curl -sf "${{ vars.PRODUCTION_URL }}/api/v1/health" > /dev/null; then
              echo "✅ Health check passed!"
              exit 0
            fi
            echo "⏳ Attempt $i failed, retrying in 10s..."
            sleep 10
          done
          echo "❌ Health check failed after 5 attempts"
          exit 1
