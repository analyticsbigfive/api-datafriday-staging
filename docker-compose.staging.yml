# Staging Environment - Supabase
services:
  api:
    image: ${API_IMAGE:-datafriday-api:staging}
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    container_name: datafriday-api-staging
    restart: always
    ports:
      - "${API_PORT:-3000}:3000"
      - "5555:5555"
    environment:
      NODE_ENV: staging
      DATABASE_URL: ${DATABASE_URL}
      PORT: 3000
      SUPABASE_URL: ${SUPABASE_URL}
      SUPABASE_ANON_KEY: ${SUPABASE_ANON_KEY}
      SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY}
      JWT_SECRET: ${JWT_SECRET}
      CORS_ORIGINS: ${CORS_ORIGINS}
      LOG_LEVEL: ${LOG_LEVEL:-info}
    volumes:
      - ./prisma:/app/prisma
    command: sh -c "npx prisma migrate deploy && node dist/main"
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/api/v1/health', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)})"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
