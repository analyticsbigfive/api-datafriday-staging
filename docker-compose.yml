services:
  # PostgreSQL Database (développement local)
  postgres:
    image: postgres:16-alpine
    container_name: datafriday-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-datafriday}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-datafriday_password}
      POSTGRES_DB: ${POSTGRES_DB:-datafriday}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - datafriday-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-datafriday}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # NestJS Application
  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    container_name: datafriday-api
    restart: unless-stopped
    ports:
      - "${API_PORT:-3000}:3000"
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      DATABASE_URL: postgresql://${POSTGRES_USER:-datafriday}:${POSTGRES_PASSWORD:-datafriday_password}@postgres:5432/${POSTGRES_DB:-datafriday}?schema=public
      PORT: 3000
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - datafriday-network
    volumes:
      - ./prisma:/app/prisma
    command: sh -c "npx prisma migrate deploy && node dist/main"

  # Development container avec hot-reload
  api-dev:
    build:
      context: .
      dockerfile: Dockerfile
      target: builder
    container_name: datafriday-api-dev
    restart: unless-stopped
    ports:
      - "${API_PORT:-3000}:3000"
    environment:
      NODE_ENV: development
      DATABASE_URL: postgresql://${POSTGRES_USER:-datafriday}:${POSTGRES_PASSWORD:-datafriday_password}@postgres:5432/${POSTGRES_DB:-datafriday}?schema=public
      PORT: 3000
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - datafriday-network
    volumes:
      - ./src:/app/src:ro
      - ./prisma:/app/prisma:ro
      - node_modules:/app/node_modules
      - dist:/app/dist
    command: sh -c "npx prisma generate && npm run start:dev"
    profiles:
      - dev

networks:
  datafriday-network:
    driver: bridge

volumes:
  postgres_data:
  node_modules:
  dist:
