services:
  # Redis - Distributed Cache & Queue Backend
  redis:
    image: redis:7-alpine
    container_name: datafriday-redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes --maxmemory 256mb --maxmemory-policy allkeys-lru
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 512M

  # BullMQ Board - Queue Monitoring UI
  bull-board:
    image: deadly0/bull-board
    container_name: datafriday-bull-board
    restart: unless-stopped
    ports:
      - "${BULL_BOARD_PORT:-3001}:3000"
    environment:
      REDIS_HOST: redis
      REDIS_PORT: 6379
    depends_on:
      redis:
        condition: service_healthy
    profiles:
      - monitoring

  # NestJS Application - Supabase
  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    container_name: datafriday-api
    restart: unless-stopped
    ports:
      - "${API_PORT:-3000}:3000"
      - "5555:5555"
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      DATABASE_URL: ${DATABASE_URL}
      DIRECT_URL: ${DIRECT_URL:-${DATABASE_URL}}
      PORT: 3000
      SUPABASE_URL: ${SUPABASE_URL}
      SUPABASE_ANON_KEY: ${SUPABASE_ANON_KEY}
      SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
      REDIS_URL: redis://redis:6379
    volumes:
      - ./prisma:/app/prisma
    depends_on:
      redis:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 2G
        reservations:
          memory: 512M
    command: sh -c "npx prisma generate && node dist/main"

  # Development container avec hot-reload
  api-dev:
    build:
      context: .
      dockerfile: Dockerfile
      target: builder
    container_name: datafriday-api-dev
    restart: unless-stopped
    ports:
      - "${API_PORT:-3000}:3000"
      - "5555:5555"
    env_file:
      - envFiles/.env.development
    environment:
      NODE_ENV: development
      PORT: 3000
      REDIS_URL: redis://redis:6379
    volumes:
      - ./src:/app/src:ro
      - ./prisma:/app/prisma:ro
      - node_modules:/app/node_modules
    depends_on:
      redis:
        condition: service_healthy
    command: sh -c "npx prisma generate && npm run start:dev"
    profiles:
      - dev

  # Supabase CLI pour migrations et gestion
  supabase-cli:
    build:
      context: .
      dockerfile: Dockerfile.supabase
    container_name: datafriday-supabase-cli
    environment:
      SUPABASE_PROJECT_ID: ${SUPABASE_PROJECT_ID}
      SUPABASE_DB_PASSWORD: ${SUPABASE_DB_PASSWORD}
      SUPABASE_URL: ${SUPABASE_URL}
      SUPABASE_ANON_KEY: ${SUPABASE_ANON_KEY}
      SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY}
      DATABASE_URL: ${DATABASE_URL}
    volumes:
      - ./supabase:/app/supabase
      - ./prisma:/app/prisma:ro
    profiles:
      - tools
    entrypoint: ["tail", "-f", "/dev/null"]

  # Frontend Vue.js - Development
  frontend-dev:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: development
    container_name: datafriday-frontend-dev
    restart: unless-stopped
    ports:
      - "5173:5173"
    env_file:
      - envFiles/.env.development
    environment:
      VITE_API_URL: http://localhost:3000/api/v1
      VITE_SUPABASE_URL: ${SUPABASE_URL}
      VITE_SUPABASE_ANON_KEY: ${SUPABASE_ANON_KEY}
    volumes:
      - ./frontend/src:/app/src:ro
      - ./frontend/public:/app/public:ro
      - ./frontend/index.html:/app/index.html:ro
      - frontend_node_modules:/app/node_modules
    profiles:
      - frontend

  # Frontend Vue.js - Production
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: production
    container_name: datafriday-frontend
    restart: unless-stopped
    ports:
      - "8080:80"
    env_file:
      - envFiles/.env.development
    depends_on:
      - api
    profiles:
      - production

volumes:
  node_modules:
  dist:
  frontend_node_modules:
  redis_data:
