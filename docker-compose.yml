services:
  # NestJS Application - Supabase
  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    container_name: datafriday-api
    restart: unless-stopped
    ports:
      - "${API_PORT:-3000}:3000"
      - "5555:5555"
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      DATABASE_URL: ${DATABASE_URL}
      PORT: 3000
      SUPABASE_URL: ${SUPABASE_URL}
      SUPABASE_ANON_KEY: ${SUPABASE_ANON_KEY}
      SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY}
    volumes:
      - ./prisma:/app/prisma
    command: sh -c "npx prisma migrate deploy && node dist/main"

  # Development container avec hot-reload
  api-dev:
    build:
      context: .
      dockerfile: Dockerfile
      target: builder
    container_name: datafriday-api-dev
    restart: unless-stopped
    ports:
      - "${API_PORT:-3000}:3000"
      - "5555:5555"
    environment:
      NODE_ENV: development
      DATABASE_URL: ${DATABASE_URL}
      PORT: 3000
      SUPABASE_URL: ${SUPABASE_URL}
      SUPABASE_ANON_KEY: ${SUPABASE_ANON_KEY}
      SUPABASE_SERVICE_ROLE_KEY: ${SUPABASE_SERVICE_ROLE_KEY}
    volumes:
      - ./src:/app/src:ro
      - ./prisma:/app/prisma:ro
      - node_modules:/app/node_modules
      - dist:/app/dist
    command: sh -c "npx prisma generate && npm run start:dev"
    profiles:
      - dev

volumes:
  node_modules:
  dist:
